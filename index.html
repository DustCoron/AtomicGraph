<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>AtomicGraph</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      try {
        // Attempt to make window.fetch writable to prevent "Cannot set property fetch" error
        // which can happen if a dependency tries to polyfill it in a restricted environment.
        Object.defineProperty(window, 'fetch', {
          value: window.fetch,
          writable: true,
          configurable: true
        });
      } catch (e) {
        // Ignore errors if we can't change it
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
